name: Update Prices Daily

on:
  schedule:
    - cron: '0 23 * * 1-5'  # runs Mon–Fri at 11pm UTC (after US market close)
  workflow_dispatch:           # lets you run it manually too

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch latest prices
        run: python scripts/fetch_prices.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date +%Y-%m-%d)"
          git push